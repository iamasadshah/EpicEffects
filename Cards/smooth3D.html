<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Hover Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;
background:#09090b;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;
overflow:hidden;

background:
radial-gradient(circle at top left,#2563eb22,transparent 35%),
radial-gradient(circle at bottom right,#7c3aed22,transparent 35%),
#09090b;

}

/* Card */

.card{

--x:50%;
--y:50%;

position:relative;

width:360px;
padding:28px;

border-radius:26px;

background:rgba(255,255,255,.04);
backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

overflow:hidden;

transition:.4s ease;

cursor:pointer;

}

/* Mouse Glow */

.card::before{

content:"";

position:absolute;

left:var(--x);
top:var(--y);

width:260px;
height:260px;

transform:translate(-50%,-50%);

background:radial-gradient(circle,
#7c3aedb1,
transparent 70%);

opacity:0;

transition:.2s;

z-index:-1;
pointer-events:none;

}

.card:hover::before{

opacity:1;

}

/* Gradient Border */

.card::after{

content:"";

position:absolute;

inset:0;

padding:1px;

border-radius:inherit;

background:linear-gradient(
135deg,
#3b82f6,
#7c3aed,
#00d4ff);

-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

opacity:0;

transition:.35s;

}

.card:hover::after{

opacity:1;

}

.card:hover{

transform:
translateY(-10px)
rotateX(5deg)
rotateY(-5deg);

box-shadow:
0 25px 60px rgba(0,0,0,.45);

}

/* Badge */

.badge{

display:inline-block;

padding:8px 14px;

border-radius:999px;

background:rgba(59,130,246,.15);

color:#8ec5ff;

font-size:13px;
font-weight:600;

margin-bottom:22px;

}

/* Title */

h2{

font-size:28px;
line-height:1.3;

margin-bottom:14px;

color:white;

}

/* Text */

p{

color:#9ca3af;

line-height:1.8;

font-size:15px;

margin-bottom:28px;

}

/* Button */

button{

padding:14px 22px;

border:none;

border-radius:14px;

background:linear-gradient(
135deg,
#2563eb,
#7c3aed);

color:white;

font-size:15px;
font-weight:600;

cursor:pointer;

transition:.35s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 12px 28px rgba(59,130,246,.35);

}

/* Floating Orb */

.orb{

position:absolute;

right:-45px;
top:-45px;

width:120px;
height:120px;

border-radius:50%;

background:linear-gradient(
135deg,
#3b82f6,
#7c3aed);

filter:blur(35px);

opacity:.45;

transition:.4s;

}

.card:hover .orb{

transform:scale(1.4);

opacity:.75;

}

/* Bottom Line */

.line{

position:absolute;

bottom:0;
left:0;

height:3px;
width:0;

background:linear-gradient(
90deg,
#3b82f6,
#00d4ff);

transition:.45s;

}

.card:hover .line{

width:100%;

}

/* Responsive */

@media(max-width:500px){

.card{

width:100%;

}

}

</style>

</head>

<body>

<div class="card">

<div class="orb"></div>

<div class="badge">
✨ Premium Card
</div>

<h2>
Modern Interactive Card
</h2>

<p>
A beautiful glassmorphism card with mouse spotlight, animated border, floating gradient orb, 3D hover movement, and elegant micro interactions.
</p>

<button>
Explore →
</button>

<div class="line"></div>

</div>

<script>

const card=document.querySelector(".card");

card.addEventListener("mousemove",(e)=>{

const rect=card.getBoundingClientRect();

const x=((e.clientX-rect.left)/rect.width)*100;
const y=((e.clientY-rect.top)/rect.height)*100;

card.style.setProperty("--x",x+"%");
card.style.setProperty("--y",y+"%");

});

</script>

</body>
</html>
